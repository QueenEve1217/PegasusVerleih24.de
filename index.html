<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pegasus Verleih</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #87ceeb, #ffffff);
      text-align: center;
    }

    header {
      background: #4a90e2;
      color: white;
      padding: 20px;
    }

    nav {
      background: #333;
      padding: 10px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #ffd700;
    }

    section {
      padding: 40px 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #a235bd;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>
  <h1>Pegasus Verleih</h1>
  <p>Es tut nicht weh bei Pegasusverleih.24.de!</p>
</header>

<nav>
  <a href="#">Start</a>
  <a href="#buchen">Buchen</a>
  <a href="#konto">Konto</a>
</nav>

<!-- LOGIN -->
<section id="konto">
  <h2>Kundenkonto</h2>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Passwort"><br>

  <button onclick="register()">Registrieren</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="status">Nicht eingeloggt</p>
</section>

<!-- START -->
<section id="start" class="hero">
  <h2>Willkommen bei dem Pegasus Verleih deines Vertrauens</h2>
  <p>Pegasi für jede Gelegenheit - diese Firma ist garantiert kein Scam</p>

  <img src="pegasus.png" alt="Pegasus">

  <p><strong>Versand einfach durchs Telefon</strong></p>
</section>

<!-- FIREBASE (NUR COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDp40QWLryGV3MxS6wOyon6Y4MZDeGOTn4",
  authDomain: "pegasusverleih.firebaseapp.com",
  projectId: "pegasusverleih",
  appId: "1:829520680349:web:a9eb2095c788796ede0b74"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// REGISTER
function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("status").innerText = "Registriert!";
    })
    .catch(error => {
      document.getElementById("status").innerText = error.message;
    });
}

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("status").innerText = "Eingeloggt!";
    })
    .catch(error => {
      document.getElementById("status").innerText = error.message;
    });
}

// LOGOUT
function logout() {
  auth.signOut();
  document.getElementById("status").innerText = "Ausgeloggt!";
}

// STATUS
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("status").innerText =
      "Eingeloggt als: " + user.email;
  } else {
    document.getElementById("status").innerText = "Nicht eingeloggt";
  }
});

// BUCHEN
function buchen(typ) {
  const user = auth.currentUser;

  if (!user) {
    alert("Bitte erst einloggen!");
    return;
  }

  alert("Du hast den " + typ + " gebucht!");
}
</script>

</body>
</html>
