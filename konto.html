<h2>Kundenkonto</h2>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Passwort"><br>

<button onclick="register()">Registrieren</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status">Nicht eingeloggt</p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDp40QWLryGV3MxS6wOyon6Y4MZDeGOTn4",
  authDomain: "pegasusverleih.firebaseapp.com",
  projectId: "pegasusverleih",
  appId: "1:829520680349:web:a9eb2095c788796ede0b74"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function register() {
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  ).then(() => status("Registriert!"))
   .catch(e => status(e.message));
}

function login() {
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(() => status("Eingeloggt!"))
   .catch(e => status(e.message));
}

function logout() {
  auth.signOut();
  status("Ausgeloggt!");
}

auth.onAuthStateChanged(user => {
  if (user) status("Eingeloggt als: " + user.email);
  else status("Nicht eingeloggt");
});

function status(text) {
  document.getElementById("status").innerText = text;
}
</script>

</body>
</html>
